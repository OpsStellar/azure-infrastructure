# Helm Values — NGINX Ingress Controller
# Optimised for single-node k3s (4 vCPU / 15 GB RAM)

controller:
  kind: DaemonSet

  hostPort:
    enabled: true

  service:
    type: NodePort

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

  admissionWebhooks:
    enabled: false

  config:
    # Proxy timeouts for microservices
    proxy-connect-timeout: "10"
    proxy-read-timeout: "120"
    proxy-send-timeout: "120"
    # Logging
    log-format-upstream: '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $request_length $request_time [$proxy_upstream_name] $upstream_addr $upstream_response_length $upstream_response_time $upstream_status $req_id'

  metrics:
    enabled: false   # Enable if Prometheus is deployed
