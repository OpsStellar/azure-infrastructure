apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-service
  namespace: platform
  labels:
    app: sample-service
    tier: backend
    managed-by: k3s-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: sample-service
        tier: backend
    spec:
      imagePullSecrets:
        - name: acr-secret
      containers:
        - name: sample-service
          image: opsstellardevacr.azurecr.io/sample-service:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: APP_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: sample-service
  namespace: platform
  labels:
    app: sample-service
spec:
  type: ClusterIP
  selector:
    app: sample-service
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-service
  namespace: platform
  labels:
    app: sample-service
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: sample-service.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-service
                port:
                  name: http
