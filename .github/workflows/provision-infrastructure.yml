name: Provision Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production
      destroy:
        description: "Destroy infrastructure"
        required: false
        default: false
        type: boolean

env:
  ARM_CLIENT_ID: 2f54ef99-beb9-4473-b696-6639d40dd76e
  ARM_CLIENT_SECRET: ED28Q~wUkWhV76OdHKFFNrwPOsqJJBkmneb8LaF4
  ARM_TENANT_ID: 185ef526-b6f9-4cd5-b6a3-4fa6039f3ae0
  ARM_SUBSCRIPTION_ID: 459e1e2d-bfc3-4a33-b475-5c1923557262
  PULUMI_CONFIG_PASSPHRASE: strongpassphrase2024!
  AZURE_STORAGE_ACCOUNT: pulumistate3033355
  AZURE_STORAGE_KEY: TFFDAn6r5YzVethYMsA3sNRqEEP+2fBkZQGEXpszcWf7OGvTsH35RR4JvofBjM4YoZHPVuVwLoc9+ASt2nAyWw==

jobs:
  infrastructure:
    name: "${{ inputs.destroy && 'Destroy' || 'Provision' }} - ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python & Pulumi
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Pulumi CLI
        uses: pulumi/actions@v5

      - name: Azure login
        run: |
          az login --service-principal \
            -u $ARM_CLIENT_ID \
            -p $ARM_CLIENT_SECRET \
            --tenant $ARM_TENANT_ID
          az account set -s $ARM_SUBSCRIPTION_ID

      - name: Create Pulumi state container
        run: |
          az storage container create \
            --name pulumistate \
            --account-name $AZURE_STORAGE_ACCOUNT \
            --account-key $AZURE_STORAGE_KEY \
            --output none

      - name: Pulumi login (Azure Blob backend)
        run: pulumi login azblob://pulumistate

      - name: Select stack
        run: pulumi stack select ${{ inputs.environment }} || pulumi stack init ${{ inputs.environment }}

      - name: Import existing Azure resources into state
        if: ${{ !inputs.destroy }}
        run: |
          ENV="${{ inputs.environment }}"
          PREFIX="opsstellar-${ENV}"
          SUB="${ARM_SUBSCRIPTION_ID}"
          RG="${PREFIX}-rg"

          import_if_exists() {
            local TYPE=$1 NAME=$2 ID=$3 CHECK_CMD=$4
            if eval "$CHECK_CMD" &>/dev/null 2>&1; then
              echo "Importing $NAME..."
              pulumi import "$TYPE" "$NAME" "$ID" --yes --skip-preview --generate-code=false 2>&1 || \
                echo "  → skipped (already in state or import failed)"
            else
              echo "  → $NAME not found in Azure, will be created by pulumi up"
            fi
          }

          # Resource Group
          import_if_exists \
            "azure-native:resources:ResourceGroup" "${RG}" \
            "/subscriptions/${SUB}/resourceGroups/${RG}" \
            "az group show --name ${RG}"

          # ACR (name strips hyphens: opsstellardevacr)
          ACR_NAME="opsstellar${ENV}acr"
          import_if_exists \
            "azure-native:containerregistry:Registry" "${PREFIX}-acr" \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerRegistry/registries/${ACR_NAME}" \
            "az acr show --name ${ACR_NAME} --resource-group ${RG}"

          # Virtual Network
          import_if_exists \
            "azure-native:network:VirtualNetwork" "${PREFIX}-vnet" \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Network/virtualNetworks/${PREFIX}-vnet" \
            "az network vnet show --name ${PREFIX}-vnet --resource-group ${RG}"

          # AKS Subnet
          import_if_exists \
            "azure-native:network:Subnet" "${PREFIX}-aks-subnet" \
            "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.Network/virtualNetworks/${PREFIX}-vnet/subnets/${PREFIX}-aks-subnet" \
            "az network vnet subnet show --name ${PREFIX}-aks-subnet --vnet-name ${PREFIX}-vnet --resource-group ${RG}"

          # AKS Cluster — name has random suffix so discover it dynamically
          AKS_NAME=$(az aks list --resource-group ${RG} --query "[0].name" -o tsv 2>/dev/null || true)
          if [ -n "$AKS_NAME" ]; then
            echo "Importing AKS cluster: ${AKS_NAME}..."
            pulumi import "azure-native:containerservice:ManagedCluster" "${PREFIX}-aks" \
              "/subscriptions/${SUB}/resourceGroups/${RG}/providers/Microsoft.ContainerService/managedClusters/${AKS_NAME}" \
              --yes --skip-preview --generate-code=false 2>&1 || \
              echo "  → skipped (already in state)"
          else
            echo "  → No AKS cluster found in ${RG}, will be created by pulumi up"
          fi

          # Remove any stale AKS state entries with wrong logical names (e.g. opsstellar-dev-aks116542dd)
          # These cause Pulumi to delete+recreate the cluster on next up
          EXPECTED_AKS_NAME="${PREFIX}-aks"
          pulumi state export 2>/dev/null | \
            jq -r '.deployment.resources[] | select(.type == "azure-native:containerservice:ManagedCluster") | .urn' | \
            while read URN; do
              LOGICAL=$(echo "$URN" | awk -F '::' '{print $NF}')
              if [ "$LOGICAL" != "$EXPECTED_AKS_NAME" ]; then
                echo "Removing stale AKS state entry: $LOGICAL (expected: $EXPECTED_AKS_NAME)"
                pulumi state delete "$URN" --yes 2>&1 || echo "  → could not delete, skipping"
              fi
            done

      - name: Pulumi up
        if: ${{ !inputs.destroy }}
        run: |
          echo "## Provisioning ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          pulumi up --yes --skip-preview

      - name: Export outputs
        if: ${{ !inputs.destroy }}
        run: |
          echo "## Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          pulumi stack output --json | jq -r 'to_entries[] | "- **\(.key)**: \(.value)"' >> $GITHUB_STEP_SUMMARY

      - name: Save kubeconfig
        if: ${{ !inputs.destroy }}
        run: pulumi stack output kubeconfig --show-secrets > kubeconfig.yaml

      - name: Upload kubeconfig
        if: ${{ !inputs.destroy }}
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-${{ inputs.environment }}
          path: kubeconfig.yaml
          retention-days: 7

      - name: Pulumi destroy
        if: ${{ inputs.destroy }}
        run: |
          echo "## Destroying ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          pulumi destroy --yes --skip-preview
          pulumi stack rm ${{ inputs.environment }} --yes
