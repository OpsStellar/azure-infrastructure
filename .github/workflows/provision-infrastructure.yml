name: Provision Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production
      action:
        description: "Action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

jobs:
  preview:
    name: Preview Changes - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify installation
        run: |
          pulumi version
          python -c "import pulumi; print('Pulumi SDK installed successfully')"

      - name: Verify Azure credentials
        run: |
          echo "Checking Azure authentication..."
          if [ -z "$ARM_CLIENT_ID" ]; then echo "❌ ARM_CLIENT_ID is not set"; exit 1; fi
          if [ -z "$ARM_CLIENT_SECRET" ]; then echo "❌ ARM_CLIENT_SECRET is not set"; exit 1; fi
          if [ -z "$ARM_TENANT_ID" ]; then echo "❌ ARM_TENANT_ID is not set"; exit 1; fi
          if [ -z "$ARM_SUBSCRIPTION_ID" ]; then echo "❌ ARM_SUBSCRIPTION_ID is not set"; exit 1; fi
          echo "✅ All Azure environment variables are set"
          echo "Testing Azure login..."
          az login --service-principal -u $ARM_CLIENT_ID -p $ARM_CLIENT_SECRET --tenant $ARM_TENANT_ID
          az account show

      - name: Pulumi login
        run: |
          mkdir -p ${{ github.workspace }}/pulumi-state
          pulumi login file://${{ github.workspace }}/pulumi-state

      - name: Select stack
        run: |
          pulumi stack select ${{ github.event.inputs.environment }} || pulumi stack init ${{ github.event.inputs.environment }}

      - name: Pulumi preview
        id: preview
        run: |
          echo "## Pulumi Preview - ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pulumi preview --diff 2>&1 | tee preview.txt
          cat preview.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Debug - List state files
        if: always()
        run: |
          echo "Workspace contents:"
          ls -la ${{ github.workspace }}/
          echo "Pulumi state contents:"
          ls -laR ${{ github.workspace }}/pulumi-state/ || echo "No state directory"

      - name: Save preview output
        uses: actions/upload-artifact@v4
        with:
          name: preview-${{ github.event.inputs.environment }}-${{ github.run_number }}
          path: preview.txt
          retention-days: 7

      - name: Check if state exists
        id: check_state
        if: always()
        run: |
          echo "=== Checking for Pulumi state ==="
          echo "Workspace: ${{ github.workspace }}"
          if [ -d "${{ github.workspace }}/pulumi-state/.pulumi" ]; then
            echo "Found state in: ${{ github.workspace }}/pulumi-state/.pulumi"
            ls -laR ${{ github.workspace }}/pulumi-state/.pulumi
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "path=${{ github.workspace }}/pulumi-state/.pulumi" >> $GITHUB_OUTPUT
          elif [ -d "${{ github.workspace }}/pulumi-state" ] && [ "$(ls -A ${{ github.workspace }}/pulumi-state)" ]; then
            echo "Found state in: ${{ github.workspace }}/pulumi-state"
            ls -laR ${{ github.workspace }}/pulumi-state
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "path=${{ github.workspace }}/pulumi-state" >> $GITHUB_OUTPUT
          else
            echo "No state found"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Pulumi state
        uses: actions/upload-artifact@v4
        if: steps.check_state.outputs.exists == 'true'
        with:
          name: pulumi-state-${{ github.event.inputs.environment }}
          path: ${{ steps.check_state.outputs.path }}
          retention-days: 1

  approve:
    name: Approve Deployment
    runs-on: ubuntu-latest
    needs: preview
    if: github.event.inputs.action == 'apply'
    environment:
      name: ${{ github.event.inputs.environment }}-approval
    steps:
      - name: Manual approval checkpoint
        run: |
          echo "✅ Deployment approved for ${{ github.event.inputs.environment }}"
          echo "Proceeding with infrastructure provisioning..."

  deploy:
    name: Deploy Infrastructure - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    needs: [preview, approve]
    if: github.event.inputs.action == 'apply'
    environment:
      name: ${{ github.event.inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Pulumi state
        uses: actions/download-artifact@v4
        continue-on-error: true
        id: download_state
        with:
          name: pulumi-state-${{ github.event.inputs.environment }}
          path: ${{ github.workspace }}/pulumi-state

      - name: Pulumi login
        run: |
          mkdir -p ${{ github.workspace }}/pulumi-state
          pulumi login file://${{ github.workspace }}/pulumi-state

      - name: Select stack
        run: |
          pulumi stack select ${{ github.event.inputs.environment }}

      - name: Pulumi up
        run: |
          echo "## Deploying to ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          pulumi up --yes --skip-preview

      - name: Export outputs
        run: |
          echo "## Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          pulumi stack output --json | jq -r 'to_entries[] | "- **\(.key)**: \(.value)"' >> $GITHUB_STEP_SUMMARY

      - name: Export kubeconfig
        run: |
          pulumi stack output kubeconfig --show-secrets > kubeconfig.yaml

      - name: Upload kubeconfig
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-${{ github.event.inputs.environment }}
          path: kubeconfig.yaml
          retention-days: 7

  destroy:
    name: Destroy Infrastructure - ${{ github.event.inputs.environment }}
    runs-on: ubuntu-latest
    if: github.event.inputs.action == 'destroy'
    environment:
      name: ${{ github.event.inputs.environment }}-destroy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Pulumi CLI
        uses: pulumi/actions@v5

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pulumi login
        run: |
          mkdir -p ${{ github.workspace }}/pulumi-state
          pulumi login file://${{ github.workspace }}/pulumi-state

      - name: Select stack
        run: |
          pulumi stack select ${{ github.event.inputs.environment }}

      - name: Pulumi preview destroy
        run: |
          echo "## Preview Destroy - ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          pulumi preview --diff 2>&1 | tee destroy-preview.txt
          cat destroy-preview.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Confirm and destroy
        run: |
          echo "## Destroying ${{ github.event.inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          pulumi destroy --yes --skip-preview
