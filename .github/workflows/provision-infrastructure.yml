name: Provision Azure Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - production
      destroy:
        description: "Destroy infrastructure"
        required: false
        default: false
        type: boolean

env:
  ARM_CLIENT_ID: 2f54ef99-beb9-4473-b696-6639d40dd76e
  ARM_CLIENT_SECRET: ED28Q~wUkWhV76OdHKFFNrwPOsqJJBkmneb8LaF4
  ARM_TENANT_ID: 185ef526-b6f9-4cd5-b6a3-4fa6039f3ae0
  ARM_SUBSCRIPTION_ID: 459e1e2d-bfc3-4a33-b475-5c1923557262
  PULUMI_CONFIG_PASSPHRASE: strongpassphrase2024!
  AZURE_STORAGE_ACCOUNT: pulumistate3033355
  AZURE_STORAGE_KEY: TFFDAn6r5YzVethYMsA3sNRqEEP+2fBkZQGEXpszcWf7OGvTsH35RR4JvofBjM4YoZHPVuVwLoc9+ASt2nAyWw==

jobs:
  infrastructure:
    name: "${{ inputs.destroy && 'Destroy' || 'Provision' }} - ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python & Pulumi
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Pulumi CLI
        uses: pulumi/actions@v5

      - name: Azure login
        run: |
          az login --service-principal \
            -u $ARM_CLIENT_ID \
            -p $ARM_CLIENT_SECRET \
            --tenant $ARM_TENANT_ID
          az account set -s $ARM_SUBSCRIPTION_ID

      - name: Pulumi login (Azure Blob backend)
        run: pulumi login azblob://pulumistate --self-managed-state-encryption

      - name: Select stack
        run: pulumi stack select ${{ inputs.environment }} || pulumi stack init ${{ inputs.environment }}

      - name: Pulumi up
        if: ${{ !inputs.destroy }}
        run: |
          echo "## Provisioning ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          pulumi up --yes --skip-preview

      - name: Export outputs
        if: ${{ !inputs.destroy }}
        run: |
          echo "## Infrastructure Outputs" >> $GITHUB_STEP_SUMMARY
          pulumi stack output --json | jq -r 'to_entries[] | "- **\(.key)**: \(.value)"' >> $GITHUB_STEP_SUMMARY

      - name: Save kubeconfig
        if: ${{ !inputs.destroy }}
        run: pulumi stack output kubeconfig --show-secrets > kubeconfig.yaml

      - name: Upload kubeconfig
        if: ${{ !inputs.destroy }}
        uses: actions/upload-artifact@v4
        with:
          name: kubeconfig-${{ inputs.environment }}
          path: kubeconfig.yaml
          retention-days: 7

      - name: Pulumi destroy
        if: ${{ inputs.destroy }}
        run: |
          echo "## Destroying ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          pulumi destroy --yes --skip-preview
          pulumi stack rm ${{ inputs.environment }} --yes
