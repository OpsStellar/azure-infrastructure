name: opsverse-aks
runtime: python
description: Production AKS infrastructure with Istio service mesh for OpsVerse SaaS

config:
  # Azure Configuration
  azure-native:location:
    description: Azure region for deployment
    default: eastus
  
  # Environment
  environment:
    description: Environment name (dev, staging, production)
    default: production
  
  # AKS Configuration
  k8s_version:
    description: Kubernetes version
    default: "1.28.3"
  
  node_count:
    description: Initial number of nodes
    default: 2
  
  node_vm_size:
    description: VM size for nodes (Standard_B2s, Standard_B2ms, Standard_D2s_v3)
    default: Standard_B2s
  
  enable_autoscaling:
    description: Enable cluster autoscaling
    default: true
  
  min_node_count:
    description: Minimum number of nodes when autoscaling
    default: 2
  
  max_node_count:
    description: Maximum number of nodes when autoscaling
    default: 5
  
  # Service Mesh
  enable_istio:
    description: Enable Istio service mesh
    default: true
  
  # Monitoring
  enable_monitoring:
    description: Enable Azure Monitor for containers
    default: true
  
  # Database Configuration
  postgres_password:
    description: PostgreSQL admin password
    secret: true
  
  # JWT Configuration (for services)
  jwt_secret_key:
    description: JWT secret key for authentication
    secret: true
    default: ""
  
  # Jenkins Configuration (Optional)
  jenkins_url:
    description: Jenkins server URL
    default: ""
  
  jenkins_username:
    description: Jenkins username
    default: ""
  
  jenkins_api_token:
    description: Jenkins API token
    secret: true
    default: ""
