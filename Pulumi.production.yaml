# Production Environment Configuration
config:
  # Azure Configuration
  azure-native:location: eastus

  # Environment
  opsstellar-azure:environment: production

  # Kubernetes Configuration
  opsstellar-azure:k8s_version: "1.28.3"
  opsstellar-azure:node_count: "3"
  opsstellar-azure:node_vm_size: Standard_D2s_v3
  opsstellar-azure:min_node_count: "2"
  opsstellar-azure:max_node_count: "10"

  # Network Configuration
  opsstellar-azure:vnet_address_space: "10.20.0.0/16"
  opsstellar-azure:aks_subnet_prefix: "10.20.0.0/20"
  opsstellar-azure:service_cidr: "10.21.0.0/16"
  opsstellar-azure:dns_service_ip: "10.21.0.10"

  # ACR Configuration
  opsstellar-azure:acr_sku: Standard

  # Resource naming
  opsstellar-azure:project_name: opsstellar

